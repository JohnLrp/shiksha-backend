version: '3.9'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      # nginx config
      - ./nginx:/etc/nginx/conf.d

      # django static & media
      - ./static:/static
      - ./media:/media

      # 🔥 frontend builds (Vite → dist)
      - ./shiksha-frontend/dist:/usr/share/nginx/html/main
      - ./student_dashboard/dist:/usr/share/nginx/html/student
      - ./teacher_ui/dist:/usr/share/nginx/html/teacher

    depends_on:
      - backend

  backend:
    build: ./shiksha-backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    volumes:
      # 🔥 shared with nginx
      - ./static:/app/static
      - ./media:/app/media
    depends_on:
      - postgres
      - redis

  celery:
    build: ./shiksha-backend
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: user
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

volumes:
  postgres_data:
